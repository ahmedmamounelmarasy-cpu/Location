<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - LOCATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; }
        .admin-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-red { background: #FF2400; transition: 0.3s; }
        .btn-red:hover { background: #CC1D00; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="max-w-md w-full admin-card p-8 rounded-3xl text-center">
            <svg class="h-16 w-16 text-red-600 mx-auto mb-6" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
            <h1 class="text-3xl font-black mb-2">تسجيل الدخول</h1>
            <p class="text-gray-400 mb-8">أدخل كلمة المرور لإدارة الموقع</p>
            <input type="password" id="admin-password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4 text-center focus:border-red-600 outline-none" placeholder="كلمة المرور">
            <button onclick="checkPassword()" class="w-full btn-red py-3 rounded-xl font-bold text-lg">دخول</button>
            <p id="login-error" class="text-red-500 mt-4 hidden">كلمة المرور غير صحيحة!</p>
        </div>
    </div>

    <!-- Admin Content (Hidden by default) -->
    <div id="admin-content" class="hidden">
        <nav class="bg-black/80 backdrop-blur-md border-b border-white/10 sticky top-0 z-50">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <svg class="h-8 w-8 text-red-600" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <span class="text-xl font-black">لوحة تحكم LOCATION</span>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-white transition-colors">خروج</button>
            </div>
        </nav>

        <div class="container mx-auto px-6 pt-12">
            <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                <h2 class="text-4xl font-black">إدارة <span class="text-red-600">المنتجات</span></h2>
                <div class="flex gap-4">
                    <button onclick="openQRModal()" class="bg-white/5 hover:bg-white/10 border border-white/10 px-6 py-3 rounded-full font-bold text-sm transition-all flex items-center gap-2">
                        <i data-lucide="qr-code" class="w-4 h-4 text-red-600"></i> رمز المنيو
                    </button>
                    <a href="cashier.html" class="bg-green-600/10 hover:bg-green-600/20 border border-green-600/20 px-6 py-3 rounded-full font-bold text-sm transition-all flex items-center gap-2 text-green-500">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> سيستم الكاشير
                    </a>
                    <button onclick="showAddModal()" class="btn-red px-8 py-3 rounded-full font-bold flex items-center gap-2">
                        <i data-lucide="plus"></i> إضافة منتج جديد
                    </button>
                </div>
            </div>

            <!-- Products Table/Grid -->
            <div id="admin-products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Products will be injected here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="product-modal" class="fixed inset-0 z-[110] bg-black/90 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div class="max-w-2xl w-full admin-card p-8 rounded-3xl overflow-y-auto max-h-[90vh]">
            <h3 id="modal-title" class="text-2xl font-black mb-6">إضافة منتج جديد</h3>
            <form id="product-form" onsubmit="handleProductSubmit(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">اسم المنتج</label>
                    <input type="text" id="prod-name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 focus:border-red-600 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">السعر (ج.م)</label>
                        <input type="number" id="prod-price" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 focus:border-red-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">التصنيف</label>
                        <select id="prod-category" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-2 focus:border-red-600 outline-none">
                            <option value="قهوة ساخنة">قهوة ساخنة</option>
                            <option value="مشروبات باردة">مشروبات باردة</option>
                            <option value="حلويات">حلويات</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">صورة المنتج</label>
                    <div class="flex flex-col gap-4">
                        <input type="file" id="prod-image-file" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <button type="button" onclick="document.getElementById('prod-image-file').click()" class="w-full bg-white/5 border border-dashed border-white/20 rounded-xl py-8 flex flex-col items-center justify-center hover:bg-white/10 transition-all group">
                            <i data-lucide="upload-cloud" class="mb-2 text-gray-400 group-hover:text-red-500"></i>
                            <span class="text-sm text-gray-400" id="upload-text">اضغط لرفع صورة من جهازك</span>
                        </button>
                        <div id="image-preview-container" class="hidden">
                            <img id="image-preview" src="" class="h-32 w-32 object-cover rounded-xl border border-white/10">
                        </div>
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                            <div class="relative flex justify-center text-xs uppercase"><span class="bg-black px-2 text-gray-500">أو استخدم رابط</span></div>
                        </div>
                        <input type="text" id="prod-image-url" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 focus:border-red-600 outline-none text-sm" placeholder="https://...">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">الوصف</label>
                    <textarea id="prod-desc" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 focus:border-red-600 outline-none h-24"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-grow btn-red py-3 rounded-xl font-bold">حفظ المنتج</button>
                    <button type="button" onclick="closeModal()" class="px-8 py-3 bg-white/5 hover:bg-white/10 rounded-xl font-bold transition-all">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="fixed inset-0 z-[110] bg-black/90 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div class="max-w-md w-full admin-card p-8 rounded-3xl text-center">
            <h3 class="text-2xl font-black mb-6 flex items-center justify-center gap-2">
                <i data-lucide="qr-code" class="text-red-600"></i>
                رمز المنيو (QR Code)
            </h3>
            <div class="flex flex-col items-center gap-6">
                <div id="qrcode" class="bg-white p-4 rounded-2xl shadow-xl inline-block"></div>
                <div class="flex gap-4 w-full">
                    <button onclick="downloadQR()" class="flex-grow bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        تحميل
                    </button>
                    <button onclick="closeQRModal()" class="px-6 py-3 bg-white/5 hover:bg-white/10 rounded-xl font-bold transition-all">إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "123";
        const SUPABASE_URL = 'https://xxvxynoesnpiitlbglpk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4dnh5bm9lc25waWl0bGJnbHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzA2NjcsImV4cCI6MjA5MzM0NjY2N30.ZZ5drqV3hnO68ZTZ1nkhrs_JN3lz_987fIDsLeyYSgE';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const defaultProducts = [
            {
                id: 1,
                name: "إسبريسو",
                price: 45,
                category: "قهوة ساخنة",
                image: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&q=80&w=500",
                description: "قهوة مركزة وغنية بالنكهة"
            },
            {
                id: 2,
                name: "كابتشينو",
                price: 65,
                category: "قهوة ساخنة",
                image: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?auto=format&fit=crop&q=80&w=500",
                description: "إسبريسو مع حليب مبخر ورغوة غنية"
            },
            {
                id: 3,
                name: "لاتيه بارد",
                price: 75,
                category: "مشروبات باردة",
                image: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&q=80&w=500",
                description: "إسبريسو مع حليب بارد وثلج"
            },
            {
                id: 4,
                name: "موكا مثلجة",
                price: 85,
                category: "مشروبات باردة",
                image: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?auto=format&fit=crop&q=80&w=500",
                description: "مزيج الشوكولاتة والقهوة مع الثلج"
            },
            {
                id: 5,
                name: "كيكة الشوكولاتة",
                price: 90,
                category: "حلويات",
                image: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=500",
                description: "كيكة غنية بقطع الشوكولاتة الذائبة"
            },
            {
                id: 6,
                name: "تشيز كيك",
                price: 95,
                category: "حلويات",
                image: "https://images.unsplash.com/photo-1524350300363-0233e515918e?auto=format&fit=crop&q=80&w=500",
                description: "تشيز كيك كريمي مع صوص التوت"
            },
            {
                id: 7,
                name: "فلات وايت",
                price: 70,
                category: "قهوة ساخنة",
                image: "https://images.unsplash.com/photo-1551033406-611cf9a28f67?auto=format&fit=crop&q=80&w=500",
                description: "توازن مثالي بين الإسبريسو والحليب"
            },
            {
                id: 8,
                name: "سموثي مانجو",
                price: 80,
                category: "مشروبات باردة",
                image: "https://images.unsplash.com/photo-1525385133335-842822916523?auto=format&fit=crop&q=80&w=500",
                description: "مانجو طازجة ومثلجة"
            }
        ];

        let products = [];

        async function fetchAdminProducts() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('*');
            
            if (error) {
                console.error('Error:', error);
                products = defaultProducts;
            } else {
                products = data.length > 0 ? data : defaultProducts;
            }
            renderAdminProducts();
        }

        function checkPassword() {
            const pass = document.getElementById('admin-password').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').classList.remove('hidden');
                fetchAdminProducts();
                lucide.createIcons();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        let qrGenerated = false;
        function openQRModal() {
            document.getElementById('qr-modal').classList.remove('hidden');
            if (!qrGenerated) {
                const siteURL = window.location.origin;
                new QRCode(document.getElementById("qrcode"), {
                    text: siteURL,
                    width: 256,
                    height: 256,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                qrGenerated = true;
            }
            lucide.createIcons();
        }

        function closeQRModal() {
            document.getElementById('qr-modal').classList.add('hidden');
        }

        function downloadQR() {
            const canvas = document.querySelector("#qrcode canvas");
            if (!canvas) {
                const img = document.querySelector("#qrcode img");
                if (img) {
                    const link = document.createElement("a");
                    link.download = "qr-code.png";
                    link.href = img.src;
                    link.click();
                }
                return;
            }
            const link = document.createElement("a");
            link.download = "qr-code.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        function logout() {
            location.reload();
        }

        function renderAdminProducts() {
            const grid = document.getElementById('admin-products-grid');
            grid.innerHTML = products.map(p => `
                <div class="admin-card rounded-2xl overflow-hidden flex flex-col">
                    <img src="${p.image}" class="h-40 w-full object-cover opacity-60">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-xl">${p.name}</h4>
                            <span class="text-red-500 font-black">${p.price} ج.م</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-4">${p.category}</p>
                        <div class="flex gap-2">
                            <button onclick="editProduct(${p.id})" class="flex-grow bg-white/10 hover:bg-white/20 py-2 rounded-lg text-sm font-bold transition-all">تعديل</button>
                            <button onclick="deleteProduct(${p.id})" class="px-4 bg-red-600/20 hover:bg-red-600/40 text-red-500 py-2 rounded-lg text-sm font-bold transition-all">حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showAddModal() {
            document.getElementById('modal-title').innerText = "إضافة منتج جديد";
            document.getElementById('product-form').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('upload-text').innerText = "اضغط لرفع صورة من جهازك";
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('image-preview').src = e.target.result;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                    document.getElementById('upload-text').innerText = "تم اختيار صورة: " + input.files[0].name;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const urlInput = document.getElementById('prod-image-url');
            
            let imageData = document.getElementById('image-preview').src;
            if (!imageData || imageData === "" || imageData === window.location.href) {
                imageData = urlInput.value;
            }

            const productData = {
                name: document.getElementById('prod-name').value,
                price: parseFloat(document.getElementById('prod-price').value),
                category: document.getElementById('prod-category').value,
                image: imageData,
                description: document.getElementById('prod-desc').value
            };

            let error;
            if (id) {
                // Update existing
                const { error: updateError } = await supabaseClient
                    .from('products')
                    .update(productData)
                    .eq('id', parseInt(id));
                error = updateError;
            } else {
                // Insert new
                const { error: insertError } = await supabaseClient
                    .from('products')
                    .insert([productData]);
                error = insertError;
            }

            if (error) {
                alert('خطأ في حفظ المنتج: ' + error.message);
            } else {
                fetchAdminProducts();
                closeModal();
            }
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            if (!p) return;

            document.getElementById('modal-title').innerText = "تعديل المنتج";
            document.getElementById('edit-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-price').value = p.price;
            document.getElementById('prod-category').value = p.category;
            
            if (p.image.startsWith('data:')) {
                document.getElementById('image-preview').src = p.image;
                document.getElementById('image-preview-container').classList.remove('hidden');
                document.getElementById('prod-image-url').value = "";
            } else {
                document.getElementById('prod-image-url').value = p.image;
                document.getElementById('image-preview-container').classList.add('hidden');
            }
            
            document.getElementById('prod-desc').value = p.description;
            document.getElementById('product-modal').classList.remove('hidden');
        }

        async function deleteProduct(id) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    alert('خطأ في حذف المنتج: ' + error.message);
                } else {
                    fetchAdminProducts();
                }
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
